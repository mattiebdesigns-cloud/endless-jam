<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Layout Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #111; color: #eee; min-height: 100vh; padding: 16px; }
    h1 { font-size: 1.1rem; color: #0ff; margin-bottom: 4px; }
    .hint { font-size: 0.75rem; color: #888; margin-bottom: 12px; }
    .hint strong { color: #ff0; }

    .workspace { display: flex; gap: 16px; align-items: flex-start; }

    .img-wrap {
      position: relative; flex-shrink: 0; max-width: 68vw;
      cursor: crosshair; user-select: none;
    }
    .img-wrap img { display: block; max-width: 100%; pointer-events: none; }

    /* Live drag preview box */
    #drag-preview {
      position: absolute; border: 2px dashed #ff0;
      background: rgba(255,255,0,0.08); pointer-events: none; display: none;
    }

    /* Committed boxes */
    .box-overlay {
      position: absolute; border: 2px solid #ff0;
      background: rgba(255,255,0,0.06); pointer-events: none;
    }
    .box-label {
      position: absolute; font-size: 10px;
      background: rgba(0,0,0,0.82); color: #ff0;
      padding: 1px 4px; border-radius: 3px; white-space: nowrap;
      top: 0; left: 0; transform: translateY(-100%);
      pointer-events: none;
    }

    .panel { flex: 1; min-width: 260px; max-width: 360px; }

    #coords-display {
      font-size: 0.78rem; padding: 8px 10px;
      background: #1a1a1a; border: 1px solid #444; border-radius: 4px;
      margin-bottom: 10px; line-height: 1.7; min-height: 38px;
    }
    #coords-display .val { color: #0ff; font-weight: bold; }

    #boxes-list { list-style: none; font-size: 0.75rem; }
    #boxes-list li {
      padding: 4px 0; border-bottom: 1px solid #222;
    }
    #boxes-list .row1 { display: flex; align-items: center; gap: 5px; }
    #boxes-list .num  { color: #888; min-width: 18px; }
    #boxes-list .label-input {
      background: #222; border: 1px solid #444; color: #eee;
      font-family: monospace; font-size: 0.72rem; padding: 1px 4px; flex: 1;
    }
    #boxes-list .anchor-btn {
      background: #333; border: 1px solid #555; color: #aaa;
      font-family: monospace; font-size: 0.65rem; padding: 1px 5px;
      border-radius: 3px; cursor: pointer; white-space: nowrap;
    }
    #boxes-list .anchor-btn.bottom { background: #002244; border-color: #0066aa; color: #66aaff; }
    #boxes-list .del-btn {
      background: #500; border: none; color: #f88; cursor: pointer;
      font-size: 0.65rem; padding: 1px 5px; border-radius: 3px;
    }
    #boxes-list .coords {
      color: #ff0; font-size: 0.68rem; margin-top: 1px; padding-left: 22px;
      line-height: 1.5;
    }

    .btn-row { margin-top: 12px; display: flex; gap: 8px; }
    #copy-btn, #clear-btn {
      background: #0ff; color: #000; border: none;
      font-family: monospace; font-size: 0.82rem; padding: 5px 14px;
      cursor: pointer; border-radius: 4px;
    }
    #clear-btn { background: #500; color: #f88; }
    #copy-btn:hover { background: #0dd; }
    #clear-btn:hover { background: #700; }

    #output {
      margin-top: 10px; background: #0a1a0a; border: 1px solid #2a4a2a;
      border-radius: 4px; padding: 10px; font-size: 0.72rem;
      white-space: pre; color: #7fdb7f; display: none; overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>Layout Tool</h1>
  <p class="hint"><strong>Drag</strong> to draw a box. Toggle <strong>top/bottom</strong> anchor per box. Coordinates map 1:1 to CSS.</p>

  <div class="workspace" id="workspace">
    <div class="img-wrap" id="img-wrap">
      <img id="preview" src="notebook-scene.jpg" alt="notebook"/>
      <div id="drag-preview"></div>
    </div>

    <div class="panel">
      <div id="coords-display">drag on the image to place a box</div>
      <ul id="boxes-list"></ul>
      <div class="btn-row">
        <button id="copy-btn" style="display:none">Copy CSS</button>
        <button id="clear-btn" style="display:none">Clear all</button>
      </div>
      <pre id="output"></pre>
    </div>
  </div>

  <script>
    const imgWrap    = document.getElementById('img-wrap');
    const preview    = document.getElementById('preview');
    const dragPrev   = document.getElementById('drag-preview');
    const coordsDisp = document.getElementById('coords-display');
    const boxesList  = document.getElementById('boxes-list');
    const copyBtn    = document.getElementById('copy-btn');
    const clearBtn   = document.getElementById('clear-btn');
    const output     = document.getElementById('output');

    let boxes  = [];
    let nextId = 1;
    let dragging = false;
    let dragStart = null;

    function getPct(e) {
      const r = preview.getBoundingClientRect();
      return {
        x: Math.max(0, Math.min(100, (e.clientX - r.left) / r.width  * 100)),
        y: Math.max(0, Math.min(100, (e.clientY - r.top)  / r.height * 100)),
      };
    }

    // ── Hover display ───────────────────────────────────────────
    imgWrap.addEventListener('mousemove', e => {
      if (dragging) return;
      const { x, y } = getPct(e);
      coordsDisp.innerHTML =
        `left: <span class="val">${x.toFixed(1)}%</span> &nbsp; ` +
        `top: <span class="val">${y.toFixed(1)}%</span> &nbsp; ` +
        `bottom: <span class="val">${(100-y).toFixed(1)}%</span>`;
    });
    imgWrap.addEventListener('mouseleave', () => {
      if (!dragging) coordsDisp.textContent = 'drag on the image to place a box';
    });

    // ── Drag to draw ────────────────────────────────────────────
    imgWrap.addEventListener('mousedown', e => {
      e.preventDefault();
      dragging = true;
      dragStart = getPct(e);
      dragPrev.style.display = 'block';
      updateDragPreview(dragStart, dragStart);
    });

    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const cur = getPct(e);
      updateDragPreview(dragStart, cur);
      const x1 = Math.min(dragStart.x, cur.x), x2 = Math.max(dragStart.x, cur.x);
      const y1 = Math.min(dragStart.y, cur.y), y2 = Math.max(dragStart.y, cur.y);
      coordsDisp.innerHTML =
        `left: <span class="val">${x1.toFixed(1)}%</span> &nbsp; ` +
        `top: <span class="val">${y1.toFixed(1)}%</span> &nbsp; ` +
        `width: <span class="val">${(x2-x1).toFixed(1)}%</span> &nbsp; ` +
        `height: <span class="val">${(y2-y1).toFixed(1)}%</span>`;
    });

    window.addEventListener('mouseup', e => {
      if (!dragging) return;
      dragging = false;
      dragPrev.style.display = 'none';
      const end = getPct(e);
      const x1 = Math.min(dragStart.x, end.x), x2 = Math.max(dragStart.x, end.x);
      const y1 = Math.min(dragStart.y, end.y), y2 = Math.max(dragStart.y, end.y);
      // ignore tiny accidental clicks
      if ((x2 - x1) < 0.5 && (y2 - y1) < 0.5) { coordsDisp.textContent = 'drag on the image to place a box'; return; }
      addBox(x1, y1, x2 - x1, y2 - y1);
    });

    function updateDragPreview(a, b) {
      const r = preview.getBoundingClientRect();
      const x1p = Math.min(a.x, b.x), x2p = Math.max(a.x, b.x);
      const y1p = Math.min(a.y, b.y), y2p = Math.max(a.y, b.y);
      dragPrev.style.left   = x1p + '%';
      dragPrev.style.top    = y1p + '%';
      dragPrev.style.width  = (x2p - x1p) + '%';
      dragPrev.style.height = (y2p - y1p) + '%';
    }

    // ── Commit box ──────────────────────────────────────────────
    function addBox(left, top, width, height) {
      const id = nextId++;
      boxes.push({ id, left, top, width, height, label: '', anchor: 'top' });

      // Overlay on image
      const box = document.createElement('div');
      box.className = 'box-overlay'; box.id = `box-${id}`;
      box.style.left   = left   + '%';
      box.style.top    = top    + '%';
      box.style.width  = width  + '%';
      box.style.height = height + '%';
      const lbl = document.createElement('div');
      lbl.className = 'box-label'; lbl.id = `box-lbl-${id}`;
      lbl.textContent = String(id);
      box.appendChild(lbl);
      imgWrap.appendChild(box);

      // Panel row
      const li = document.createElement('li');
      li.id = `row-${id}`;
      li.innerHTML = `
        <div class="row1">
          <span class="num">${id}</span>
          <input class="label-input" type="text" placeholder="name" data-id="${id}"/>
          <button class="anchor-btn" data-id="${id}">top</button>
          <button class="del-btn"    data-id="${id}">✕</button>
        </div>
        <div class="coords" id="coord-${id}">${coordStr({ left, top, width, height, anchor:'top' })}</div>`;
      boxesList.appendChild(li);

      li.querySelector('.label-input').addEventListener('input', e => {
        const b = boxes.find(b => b.id == e.target.dataset.id);
        if (!b) return;
        b.label = e.target.value;
        const lbl = document.getElementById(`box-lbl-${b.id}`);
        if (lbl) lbl.textContent = b.label || String(b.id);
      });

      li.querySelector('.anchor-btn').addEventListener('click', e => {
        const b = boxes.find(b => b.id == e.target.dataset.id);
        if (!b) return;
        b.anchor = b.anchor === 'top' ? 'bottom' : 'top';
        e.target.textContent = b.anchor;
        e.target.classList.toggle('bottom', b.anchor === 'bottom');
        document.getElementById(`coord-${b.id}`).textContent = coordStr(b);
      });

      li.querySelector('.del-btn').addEventListener('click', e => {
        const did = parseInt(e.target.dataset.id);
        boxes = boxes.filter(b => b.id !== did);
        document.getElementById(`box-${did}`)?.remove();
        document.getElementById(`row-${did}`)?.remove();
        if (!boxes.length) { copyBtn.style.display = 'none'; clearBtn.style.display = 'none'; }
      });

      copyBtn.style.display = 'inline-block';
      clearBtn.style.display = 'inline-block';
    }

    function coordStr(b) {
      const vPos = b.anchor === 'bottom'
        ? `bottom: ${(100 - b.top - b.height).toFixed(1)}%`
        : `top: ${b.top.toFixed(1)}%`;
      return `left: ${b.left.toFixed(1)}%;  ${vPos};  width: ${b.width.toFixed(1)}%;  height: ${b.height.toFixed(1)}%`;
    }

    // ── Copy CSS ────────────────────────────────────────────────
    copyBtn.addEventListener('click', () => {
      if (!boxes.length) return;
      const lines = boxes.map(b => {
        const name = b.label || `box ${b.id}`;
        return `/* ${name}: ${coordStr(b)}; */`;
      }).join('\n');
      output.textContent = lines;
      output.style.display = 'block';
      navigator.clipboard.writeText(lines).catch(() => {});
    });

    clearBtn.addEventListener('click', () => {
      boxes = []; nextId = 1;
      boxesList.innerHTML = '';
      imgWrap.querySelectorAll('.box-overlay').forEach(el => el.remove());
      copyBtn.style.display = 'none';
      clearBtn.style.display = 'none';
      output.style.display = 'none';
      coordsDisp.textContent = 'drag on the image to place a box';
    });
  </script>
</body>
</html>
