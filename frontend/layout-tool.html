<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Layout Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #111; color: #eee; min-height: 100vh; padding: 16px; }
    h1 { font-size: 1.1rem; color: #0ff; margin-bottom: 4px; }
    .hint { font-size: 0.75rem; color: #888; margin-bottom: 12px; }
    .hint strong { color: #ff0; }

    .drop-zone {
      border: 2px dashed #555; border-radius: 6px; padding: 28px;
      text-align: center; color: #888; cursor: pointer; margin-bottom: 12px;
    }
    .drop-zone.drag-over { border-color: #0ff; color: #0ff; }
    .drop-zone input { display: none; }

    .workspace { display: flex; gap: 16px; align-items: flex-start; }

    .img-wrap {
      position: relative; flex-shrink: 0; max-width: 68vw; cursor: crosshair;
      user-select: none;
    }
    .img-wrap img { display: block; max-width: 100%; }

    .pin {
      position: absolute;
      width: 0; height: 0;
      pointer-events: none;
    }
    .pin::before {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      background: #ff0; border: 1.5px solid #000; border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    .pin-label {
      position: absolute;
      font-size: 10px;
      background: rgba(0,0,0,0.8); color: #ff0;
      padding: 1px 4px; border-radius: 3px; white-space: nowrap;
      pointer-events: none;
      transform: translate(6px, -50%);
    }

    .panel { flex: 1; min-width: 260px; max-width: 340px; }

    #coords-display {
      font-size: 0.8rem; padding: 8px 12px;
      background: #1a1a1a; border: 1px solid #444; border-radius: 4px;
      margin-bottom: 10px; line-height: 1.6; min-height: 36px;
    }
    #coords-display .val { color: #0ff; font-weight: bold; }

    #points-list { list-style: none; font-size: 0.78rem; }
    #points-list li {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 0; border-bottom: 1px solid #222;
    }
    #points-list .num { color: #888; min-width: 18px; }
    #points-list .coords { color: #ff0; min-width: 148px; font-size: 0.72rem; }
    #points-list .label-input {
      background: #222; border: 1px solid #444; color: #eee;
      font-family: monospace; font-size: 0.72rem; padding: 1px 4px;
      flex: 1; min-width: 80px;
    }
    #points-list .anchor-btn {
      background: #333; border: 1px solid #555; color: #aaa;
      font-family: monospace; font-size: 0.65rem; padding: 1px 5px;
      border-radius: 3px; cursor: pointer; white-space: nowrap;
    }
    #points-list .anchor-btn.bottom { background: #002244; border-color: #0066aa; color: #66aaff; }
    #points-list .del-btn {
      background: #500; border: none; color: #f88; cursor: pointer;
      font-size: 0.65rem; padding: 1px 5px; border-radius: 3px;
    }

    .btn-row { margin-top: 12px; display: flex; gap: 8px; }
    #copy-btn, #clear-btn {
      background: #0ff; color: #000; border: none;
      font-family: monospace; font-size: 0.82rem; padding: 5px 14px;
      cursor: pointer; border-radius: 4px;
    }
    #clear-btn { background: #500; color: #f88; }
    #copy-btn:hover { background: #0dd; }
    #clear-btn:hover { background: #700; }

    #output {
      margin-top: 10px; background: #0a1a0a; border: 1px solid #2a4a2a;
      border-radius: 4px; padding: 10px; font-size: 0.72rem;
      white-space: pre; color: #7fdb7f; display: none; overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>Layout Tool</h1>
  <p class="hint">Loads <strong>notebook-scene.jpg</strong> automatically. Coordinates map 1:1 to CSS.</p>

  <div class="workspace" id="workspace">
    <div class="img-wrap" id="img-wrap">
      <img id="preview" src="notebook-scene.jpg" alt="notebook"/>
    </div>

    <div class="panel">
      <div id="coords-display">hover over image to see coordinates</div>

      <ul id="points-list"></ul>

      <div class="btn-row">
        <button id="copy-btn" style="display:none">Copy CSS</button>
        <button id="clear-btn" style="display:none">Clear all</button>
      </div>
      <pre id="output"></pre>
    </div>
  </div>

  <script>
    const workspace  = document.getElementById('workspace');
    const imgWrap    = document.getElementById('img-wrap');
    const preview    = document.getElementById('preview');
    const coordsDisp = document.getElementById('coords-display');
    const pointsList = document.getElementById('points-list');
    const copyBtn    = document.getElementById('copy-btn');
    const clearBtn   = document.getElementById('clear-btn');
    const output     = document.getElementById('output');

    let points = [];
    let nextId = 1;

    // ── Get % coordinates from mouse event ──────────────────────
    function getPercent(e) {
      const rect = preview.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width  * 100);
      const y = ((e.clientY - rect.top)  / rect.height * 100);
      return { x: Math.max(0, Math.min(100, x)), y: Math.max(0, Math.min(100, y)) };
    }

    // ── Hover: show live coordinates ────────────────────────────
    imgWrap.addEventListener('mousemove', e => {
      const { x, y } = getPercent(e);
      coordsDisp.innerHTML =
        `left: <span class="val">${x.toFixed(1)}%</span> &nbsp; top: <span class="val">${y.toFixed(1)}%</span> &nbsp; bottom: <span class="val">${(100-y).toFixed(1)}%</span>`;
    });
    imgWrap.addEventListener('mouseleave', () => {
      coordsDisp.textContent = 'hover over image to see coordinates';
    });

    // ── Click: place pin ────────────────────────────────────────
    imgWrap.addEventListener('click', e => {
      const { x, y } = getPercent(e);
      addPoint(x, y);
    });

    function addPoint(x, y) {
      const id = nextId++;
      // anchor: 'top' or 'bottom'
      points.push({ id, x, y, label: '', anchor: 'top' });

      // Pin dot on image
      const pin = document.createElement('div');
      pin.className = 'pin'; pin.id = `pin-${id}`;
      pin.style.left = x + '%';
      pin.style.top  = y + '%';
      imgWrap.appendChild(pin);

      const lbl = document.createElement('div');
      lbl.className = 'pin-label'; lbl.id = `pin-lbl-${id}`;
      lbl.textContent = String(id);
      lbl.style.left = x + '%';
      lbl.style.top  = y + '%';
      imgWrap.appendChild(lbl);

      // Row in panel
      const li = document.createElement('li');
      li.id = `row-${id}`;
      const topVal    = y.toFixed(1);
      const bottomVal = (100 - y).toFixed(1);
      li.innerHTML = `
        <span class="num">${id}</span>
        <span class="coords" id="coord-${id}">left:${x.toFixed(1)}% top:${topVal}%</span>
        <input class="label-input" type="text" placeholder="name" data-id="${id}"/>
        <button class="anchor-btn" data-id="${id}" title="Toggle top/bottom anchor">top</button>
        <button class="del-btn" data-id="${id}">✕</button>`;
      pointsList.appendChild(li);

      li.querySelector('.label-input').addEventListener('input', e => {
        const pt = points.find(p => p.id == e.target.dataset.id);
        if (!pt) return;
        pt.label = e.target.value;
        const pl = document.getElementById(`pin-lbl-${pt.id}`);
        if (pl) pl.textContent = pt.label || String(pt.id);
      });

      li.querySelector('.anchor-btn').addEventListener('click', e => {
        const did = parseInt(e.target.dataset.id);
        const pt = points.find(p => p.id === did);
        if (!pt) return;
        pt.anchor = pt.anchor === 'top' ? 'bottom' : 'top';
        e.target.textContent = pt.anchor;
        e.target.classList.toggle('bottom', pt.anchor === 'bottom');
        updateCoordDisplay(pt);
      });

      li.querySelector('.del-btn').addEventListener('click', e => {
        const did = parseInt(e.target.dataset.id);
        points = points.filter(p => p.id !== did);
        document.getElementById(`pin-${did}`)?.remove();
        document.getElementById(`pin-lbl-${did}`)?.remove();
        document.getElementById(`row-${did}`)?.remove();
        if (!points.length) { copyBtn.style.display = 'none'; clearBtn.style.display = 'none'; }
      });

      copyBtn.style.display = 'inline-block';
      clearBtn.style.display = 'inline-block';
    }

    function updateCoordDisplay(pt) {
      const el = document.getElementById(`coord-${pt.id}`);
      if (!el) return;
      const vPos = pt.anchor === 'bottom'
        ? `bottom:${(100 - pt.y).toFixed(1)}%`
        : `top:${pt.y.toFixed(1)}%`;
      el.textContent = `left:${pt.x.toFixed(1)}% ${vPos}`;
    }

    // ── Copy output ─────────────────────────────────────────────
    copyBtn.addEventListener('click', () => {
      if (!points.length) return;
      const lines = points.map(p => {
        const name  = p.label || `point ${p.id}`;
        const vPos  = p.anchor === 'bottom'
          ? `bottom: ${(100 - p.y).toFixed(1)}%`
          : `top: ${p.y.toFixed(1)}%`;
        return `/* ${name}: left: ${p.x.toFixed(1)}%; ${vPos}; */`;
      }).join('\n');
      output.textContent = lines;
      output.style.display = 'block';
      navigator.clipboard.writeText(lines).catch(() => {});
    });

    clearBtn.addEventListener('click', () => {
      points = []; nextId = 1;
      pointsList.innerHTML = '';
      imgWrap.querySelectorAll('.pin, .pin-label').forEach(el => el.remove());
      copyBtn.style.display = 'none';
      clearBtn.style.display = 'none';
      output.style.display = 'none';
    });
  </script>
</body>
</html>
